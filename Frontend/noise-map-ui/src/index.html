<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoRoute — Urban Noise System</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        #user-map {
            height: 100% !important; 
            width: 100%;
            position: relative;
            z-index: 10;
            display: block;
        }
        :root {
            --bg: #050a0f;
            --panel: #0a1219;
            --surface: #101c26;
            --border: #1e2d3d;
            --text: #e1e8ed;
            --muted: #8899a6;
            --accent: #00ffe1;
            --accent2: #ff4b6e;
            --warn: #ffb800;
            --safe: #00e676;
            --glow: 0 0 20px rgba(0, 255, 225, 0.3);
            --head: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--head);
            margin: 0;
            overflow-x: hidden;
        }

        
        #map {
            height: 450px;
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-top: 20px;
            z-index: 1;
        }

        .view {
            display: none;
            padding: 20px;
        }

        .view.active {
            display: block;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        .mode-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
        }

        .mode-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .card {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        input,
        select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin: 5px 0;
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="login-overlay">
        <div class="card" style="width: 350px; text-align: center;">
            <h2 style="color: var(--accent)">EchoRoute Login</h2>
            <div id="login-toggle" style="margin-bottom: 15px;">
                <button onclick="toggleLoginMode('user')" id="btn-user-mode">User</button>
                <button onclick="toggleLoginMode('admin')" id="btn-admin-mode"
                    style="background:transparent; color: var(--muted)">Admin</button>
            </div>

            <div id="user-login-fields">
                <input type="text" id="user-name" placeholder="Enter Your Name" style="width: 90%;">
            </div>

            <div id="admin-login-fields" style="display:none;">
                <input type="text" id="admin-id" placeholder="Admin ID" style="width: 90%;">
                <input type="password" id="admin-pass" placeholder="Password" style="width: 90%;">
            </div>

            <button onclick="handleLogin()" style="width: 100%; margin-top: 15px;">Enter System</button>
        </div>
    </div>

    <header class="header" id="main-header" style="display:none;">
        <div class="header-left">
            <span style="font-weight: bold; color: var(--accent); margin-right: 20px;">ECHOROUTE</span>
            <button onclick="switchTab('user')" class="mode-btn" id="tab-user">User View</button>
            <button onclick="switchTab('admin')" class="mode-btn" id="tab-admin">Admin View</button>
        </div>
        <div class="header-right">
            <span id="display-user-type" style="color: var(--muted); font-size: 0.9em;"></span>
        </div>
    </header>

    <main id="view-user" class="view" style="padding:0; margin:0;"></main>

    <main id="view-admin" class="view">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="card">
                <h4>Data Analytics</h4>
                <div id="noise-bars"></div>
            </div>
            <div class="card">
                <h4>System Summary</h4>
                <div id="admin-stats"></div>
            </div>
        </div>

        <div class="card">
            <h4>City Noise Visualization</h4>
        <div id="map"></div> </div>

        <div class="card">
            <h4>Live High-Risk Alerts</h4>
            <div id="alert-list"></div>
        </div>
    </main>
    
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="App.js"></script>
</body>

</html>
